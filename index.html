def _fallback_resonance_windows(params, line_shape):
    params = np.asarray(params, dtype=float)
    if str(line_shape).lower() == "voigt":
        rows = params[1:].reshape(-1, 4)
        widths = 0.5346 * rows[:, 2] + np.sqrt(0.2166 * rows[:, 2] ** 2 + rows[:, 3] ** 2)
    else:
        rows = params[1:].reshape(-1, 3)
        widths = rows[:, 2]
    return [(float(row[1]), float(width)) for row, width in zip(rows, widths)]


def _fallback_balanced_sigma(energy_ev, measured, resonances):
    energy_ev = np.asarray(energy_ev, dtype=float)
    measured = np.asarray(measured, dtype=float)
    global_scale = max(float(np.std(measured)), np.finfo(float).eps)
    sigma = np.full(measured.shape, global_scale)
    for center, fwhm in resonances:
        radius = float(np.clip(2.0 * max(float(fwhm), 0.005), 0.02, 0.08))
        mask = np.abs(energy_ev - float(center)) <= radius
        if np.count_nonzero(mask) < 7:
            continue
        x = energy_ev[mask]
        x = (x - np.mean(x)) / max(np.ptp(x), 1e-12)
        trend = np.polyval(np.polyfit(x, measured[mask], 1), x)
        local_scale = max(float(np.std(measured[mask] - trend)), np.finfo(float).eps)
        sigma[mask] = np.minimum(sigma[mask], local_scale)
    return sigma


def _fallback_resonance_diagnostics(energy_ev, measured, fitted, resonances):
    diagnostics = []
    energy_ev = np.asarray(energy_ev, dtype=float)
    measured = np.asarray(measured, dtype=float)
    fitted = np.asarray(fitted, dtype=float)
    for center, fwhm in resonances:
        radius = float(np.clip(2.0 * max(float(fwhm), 0.005), 0.02, 0.08))
        mask = np.abs(energy_ev - float(center)) <= radius
        if np.count_nonzero(mask) < 7:
            continue
        x = energy_ev[mask]
        x = (x - np.mean(x)) / max(np.ptp(x), 1e-12)
        measured_feature = measured[mask] - np.polyval(np.polyfit(x, measured[mask], 1), x)
        fitted_feature = fitted[mask] - np.polyval(np.polyfit(x, fitted[mask], 1), x)
        rss = float(np.sum((fitted_feature - measured_feature) ** 2))
        total = float(np.sum(measured_feature**2))
        amplitude = float(np.ptp(measured_feature))
        diagnostics.append({
            "center_ev": float(center),
            "local_r_squared": 1.0 - rss / total if total > 0 else np.nan,
            "amplitude_ratio": float(np.ptp(fitted_feature)) / amplitude if amplitude > 0 else np.nan,
            "points": int(np.count_nonzero(mask)),
        })
    return diagnostics

# --- Material Loader Class (Adapted) ---
class MaterialLoader:
    def __init__(self, si_filename=None, uploaded_si_file=None):
        self.si_n_interp = None
        self.si_k_interp = None

        # Priority: Uploaded > Local Default
        if uploaded_si_file is not None:
             self._init_si_interpolation_from_file(uploaded_si_file)
        elif si_filename and os.path.exists(si_filename):
             self._init_si_interpolation_from_path(si_filename)
        else:
             # Try to load default from current directory if nothing else
             if os.path.exists("Si_data.csv"):
                 self._init_si_interpolation_from_path("Si_data.csv")

    def _init_si_interpolation_from_path(self, path):
        try:
            self._process_data(path)
        except Exception as e:
            st.error(f"Error loading substrate file: {e}")

    def _init_si_interpolation_from_file(self, uploaded_file):
        try:
            self._process_data(uploaded_file)
        except Exception as e:
             st.error(f"Error loading uploaded substrate file: {e}")

    def _process_data(self, source):
        lam_nm, n_vals, k_vals = read_si_optical_constants(source)
        order = np.argsort(lam_nm)
        lam_nm = lam_nm[order]
        self.si_wavelength_range = (float(lam_nm[0]), float(lam_nm[-1]))
        self.si_n_interp = PchipInterpolator(lam_nm, n_vals[order], extrapolate=False)
        self.si_k_interp = PchipInterpolator(lam_nm, k_vals[order], extrapolate=False)
        self.si_n_edge_slopes = tuple(
            float(self.si_n_interp.derivative()(edge)) for edge in self.si_wavelength_range
        )
        self.si_k_edge_slopes = tuple(
            float(self.si_k_interp.derivative()(edge)) for edge in self.si_wavelength_range
        )

    def _evaluate_si_component(self, wavelengths_nm, interpolation, edge_slopes):
        lower, upper = self.si_wavelength_range
        clipped = np.clip(wavelengths_nm, lower, upper)
        values = interpolation(clipped)
        lower_value = float(interpolation(lower))
        upper_value = float(interpolation(upper))
        values = np.where(
            wavelengths_nm < lower,
            lower_value + edge_slopes[0] * (wavelengths_nm - lower),
            values,
        )
        return np.where(
            wavelengths_nm > upper,
            upper_value + edge_slopes[1] * (wavelengths_nm - upper),
            values,
        )

    def get_si_n(self, lam_nm):
        if self.si_n_interp is None: return 1.0 + 0j
        lam_nm = np.asarray(lam_nm, dtype=float)
        if np.any(~np.isfinite(lam_nm)) or np.any(lam_nm <= 0):
            raise ValueError("Si wavelengths must be finite and positive")
        n = self._evaluate_si_component(lam_nm, self.si_n_interp, self.si_n_edge_slopes)
        k = self._evaluate_si_component(lam_nm, self.si_k_interp, self.si_k_edge_slopes)
        n = np.maximum(n, np.finfo(float).eps)
        return n + 1j * np.maximum(k, 0.0)

    def get_si_n_with_temp(self, lam_nm, temp_k):
        if not 10.0 <= temp_k <= 300.0:
            raise ValueError("Si temperature correction is calibrated only for 10-300 K")
        n_base = self.get_si_n(lam_nm)
        lam_um = lam_nm / 1000.0
        delta_n_abs = 0.02514 + 0.00850 / (lam_um**2 - 0.10165)
        delta_k_abs = 270.16 * np.exp(-18.91 * lam_um) + 0.0029
        ratio = (298.0 - temp_k) / (298.0 - 10.0)
        correction_n = ratio * delta_n_abs
        correction_k = ratio * delta_k_abs
        n_real = np.real(n_base) - correction_n
        n_imag = np.maximum(np.imag(n_base) - correction_k, 0.0)
        return n_real + 1j * n_imag

    def get_sio2_n(self, lam_nm):
        x = lam_nm / 1000.0
        term1 = 0.9310 / (1 - (0.079 / x)**2)
        term2 = 0.1735 / (1 - (0.130 / x)**2)
        term3 = 2.1121 / (1 - (14.918 / x)**2)
        n_squared = 1 + term1 + term2 + term3
        return np.sqrt(n_squared) + 0j

    def get_hbn_n(self, lam_nm):
        lam_um = lam_nm / 1000.0
        denom = lam_um**2 - 0.1644**2
        n_squared = 1 + (3.263 * lam_um**2) / denom
        return np.sqrt(n_squared) + 0j

    def get_quartz_n(self, lam_nm):
        return self.get_sio2_n(lam_nm)

    def get_sapphire_n(self, lam_nm):
        x = lam_nm / 1000.0
        term1 = 1.4313493 / (1 - (0.0726631 / x)**2)
        term2 = 0.65054713/ (1 - (0.1193242 / x)**2)
        term3 = 5.3414021 / (1 - (18.028251 / x)**2)
        n_squared = 1 + term1 + term2 + term3
        return np.sqrt(n_squared) + 0j

    def get_tio2_n(self, lam_nm):
        x = lam_nm / 1000.0
        n_squared = 5.913 + 0.2441 / (x**2 - 0.0803)
        return np.sqrt(n_squared) + 0j

# --- Core Physics Functions ---

def dielectric_func_lorentz(E, params):
    eps_inf = params[0]
    eps = eps_inf + 0j
    num_oscillators = (len(params) - 1) // 3
    for i in range(num_oscillators):
        f = params[1 + i*3]
        E0 = params[2 + i*3]
        g = params[3 + i*3]
        numerator = f
        denominator = E0**2 - E**2 - 1j * E * g
        eps += numerator / denominator
    return eps

def calculate_contrast_dynamic(wavelengths_nm, eps_sample, mat_loader, structure_config):
    lam_arr = np.array(wavelengths_nm)
    n_2d_arr = np.sqrt(eps_sample)

    sub_type = structure_config.get('substrate_type', 'Si/SiO2')
    temp_k = structure_config.get('temp', 298.0)

    if sub_type == 'Si/SiO2':
        n_sub_arr = mat_loader.get_si_n_with_temp(lam_arr, temp_k)
        n_oxide_arr = mat_loader.get_sio2_n(lam_arr)
    elif sub_type == 'TiO2':
        n_sub_arr = mat_loader.get_tio2_n(lam_arr)
        n_oxide_arr = None
    elif sub_type == 'Quartz':
        n_sub_arr = mat_loader.get_quartz_n(lam_arr)
        n_oxide_arr = None
    elif sub_type == 'Sapphire':
        n_sub_arr = mat_loader.get_sapphire_n(lam_arr)
        n_oxide_arr = None

    n_hbn_val = mat_loader.get_hbn_n(lam_arr)
    if np.isscalar(n_hbn_val):
        n_hbn_arr = np.full_like(lam_arr, n_hbn_val, dtype=complex)
    else:
        n_hbn_arr = n_hbn_val

    def solve_stack(include_sample, include_hbn):
        stack_n = []
        stack_d = []

        if include_hbn and structure_config['has_top_hbn']:
            stack_n.append(n_hbn_arr)
            stack_d.append(structure_config['top_hbn_thick'])

        if include_sample:
            stack_n.append(n_2d_arr)
            stack_d.append(structure_config['sample_thick'])

        if include_hbn and structure_config['has_bot_hbn']:
            stack_n.append(n_hbn_arr)
            stack_d.append(structure_config['bot_hbn_thick'])

        if n_oxide_arr is not None:
             stack_n.append(n_oxide_arr)
             stack_d.append(structure_config['sio2_thick'])

        M = np.broadcast_to(np.eye(2, dtype=complex), (len(lam_arr), 2, 2)).copy()

        for n_layer, d_layer in zip(stack_n, stack_d):
            delta = 2 * np.pi * n_layer * d_layer / lam_arr
            cos_d = np.cos(delta)
            sin_d = np.sin(delta)
            m11 = cos_d
            m12 = -1j / n_layer * sin_d
            m21 = -1j * n_layer * sin_d
            m22 = cos_d
            M_layer = np.array([[m11, m12], [m21, m22]])
            M_layer = np.moveaxis(M_layer, 2, 0)
            M = np.matmul(M, M_layer)

        n_s = n_sub_arr
        n_0 = 1.0
        M11 = M[:, 0, 0]
        M12 = M[:, 0, 1]
        M21 = M[:, 1, 0]
        M22 = M[:, 1, 1]
        denom = (M11 + M12 * n_s)
        denom[denom == 0] = 1e-10
        Y = (M21 + M22 * n_s) / denom
        r = (n_0 - Y) / (n_0 + Y)
        return np.abs(r)**2

    try:
        R_sample = solve_stack(include_sample=True, include_hbn=True)
        R_ref = solve_stack(include_sample=False, include_hbn=False)
        R_ref[R_ref == 0] = 1e-10
        contrast = (R_sample - R_ref) / R_ref
        return contrast
    except Exception as e:
        raise RuntimeError("Optical model calculation failed") from e

def validate_roi(energy_ev, roi_min, roi_max, minimum_points=7):
    if roi_min >= roi_max:
        return None, "ROI Min must be smaller than ROI Max."
    if energy_ev is None:
        return None, None
    energy_ev = np.asarray(energy_ev, dtype=float)
    mask = (energy_ev >= roi_min) & (energy_ev <= roi_max)
    points = int(np.count_nonzero(mask))
    if points < minimum_points:
        return mask, f"ROI contains only {points} points; use at least {minimum_points} points."
    return mask, None


def local_fit_quality_warnings(diagnostics):
    return [item["message"] for item in local_fit_quality_flags(diagnostics)]


def local_fit_quality_flags(diagnostics):
    flags = []
    low_amplitude, high_amplitude = AMPLITUDE_RATIO_WARNING_RANGE
    for index, diagnostic in enumerate(diagnostics, start=1):
        center = diagnostic.get("center_ev", np.nan)
        local_r2 = diagnostic.get("local_r_squared", np.nan)
        amplitude_ratio = diagnostic.get("amplitude_ratio", np.nan)
        if np.isfinite(local_r2) and local_r2 < LOCAL_R2_WARNING_THRESHOLD:
            message = (
                f"Peak {index} ({center:.4f} eV) has weak local fit quality: "
                f"Local R2={local_r2:.3f}."
            )
            flags.append({"peak": index, "kind": "low_local_r2", "message": message})
        if (
            np.isfinite(amplitude_ratio)
            and not low_amplitude <= amplitude_ratio <= high_amplitude
        ):
            message = (
                f"Peak {index} ({center:.4f} eV) amplitude is mismatched: "
                f"fit/measured={amplitude_ratio:.2f}."
            )
            flags.append({"peak": index, "kind": "amplitude_mismatch", "message": message})
    return flags

        data_samp = df_samp.iloc[:, 0:2].apply(pd.to_numeric, errors='coerce').dropna().values
        wl_samp = data_samp[:, 0]
        y_samp = data_samp[:, 1]

        # Unit Correction (eV -> nm)
        # Assuming if mean < 100, it's eV.
        if np.mean(wl_sub) < 100:
             wl_sub = HC_EV_NM / wl_sub
             # Sort if needed (inverse flips order)
             idx = np.argsort(wl_sub)
             wl_sub = wl_sub[idx]
             y_sub = y_sub[idx]

        if np.mean(wl_samp) < 100:
             wl_samp = HC_EV_NM / wl_samp
             idx = np.argsort(wl_samp)
             wl_samp = wl_samp[idx]
             y_samp = y_samp[idx]

        # Interpolate Sample onto Substrate Grid
        f_samp = interp1d(wl_samp, y_samp, kind='cubic', bounds_error=False, fill_value=np.nan)
        y_samp_interp = f_samp(wl_sub)

        # Mask valid
        mask = (~np.isnan(y_samp_interp)) & (y_sub != 0)
        wl_final = wl_sub[mask]
        sub_final = y_sub[mask]
        samp_final = y_samp_interp[mask]

        # Calculate Contrast
        substrate_is_unit_placeholder = (
            np.ptp(sub_final) <= 1e-8 and np.allclose(sub_final, 1.0, atol=1e-8)
            and np.any(samp_final < 0)
        )
        contrast = (
            samp_final if substrate_is_unit_placeholder
            else (samp_final - sub_final) / sub_final
        )

        # Return x in eV, y_contrast
        x_ev = HC_EV_NM / wl_final

        # Sort by eV (low to high)
        idx_ev = np.argsort(x_ev)
        return x_ev[idx_ev], contrast[idx_ev], None

    except Exception as e:
        return None, None, str(e)

import numpy as np
from scipy.special import wofz


HC_EV_NM = 1239.8419843320026
SUBSTRATE_MATERIALS = ("Si", "Quartz", "Sapphire", "TiO2")
LAYER_MATERIALS = (
    "Sample", "hBN", "Graphene", "SiO2", "Si", "Quartz", "Sapphire", "TiO2"
)


def default_layer_stack(substrate_type="Si/SiO2"):
    """Return a table-friendly top-to-bottom layer stack."""
    layers = [{"material": "Sample", "thickness_nm": 0.65, "in_reference": False,
               "fit": False, "min_nm": 0.1, "max_nm": 5.0}]
    if substrate_type == "Si/SiO2":
        layers.append({"material": "SiO2", "thickness_nm": 285.0, "in_reference": True,
                       "fit": True, "min_nm": 265.0, "max_nm": 305.0})
    return layers


def _is_substrate_row(material, thickness, index, row_count):
    """A final zero-thickness substrate row represents the semi-infinite medium."""
    return (
        index == row_count - 1
        and material in SUBSTRATE_MATERIALS
        and abs(float(thickness)) <= 1e-12
    )


def substrate_type_from_config(config):
    """Read the semi-infinite substrate from the final table row when present."""
    rows = list(config.get("layers", []))
    for index, row in enumerate(rows):
        material = str(row.get("material", "")).strip()
        thickness = float(row.get("thickness_nm", 0.0))
        if _is_substrate_row(material, thickness, index, len(rows)):
            return material
    return config.get("substrate_type", "Si")


def forward_normal_wavevector(refractive_index, sine_squared):
    """Return the forward-propagating normal wavevector component.

    Complex square roots have two branches. For absorbing media the forward
    branch has non-negative imaginary part so fields decay with depth; for
    lossless media the branch has non-negative real part.
    """
    wavevector = np.sqrt(np.asarray(refractive_index, dtype=complex) ** 2 - sine_squared + 0j)
    tolerance = 100.0 * np.finfo(float).eps
    flip = (np.imag(wavevector) < -tolerance) | (
        (np.abs(np.imag(wavevector)) <= tolerance) & (np.real(wavevector) < 0)
    )
    return np.where(flip, -wavevector, wavevector)


def normalized_layer_stack(config):
    """Validate a layer table, or translate the legacy fixed-layer config."""
    if "layers" in config:
        layers = []
        rows = list(config["layers"])
        for index, row in enumerate(rows):
            material = str(row.get("material", "")).strip()
            if material not in LAYER_MATERIALS:
                raise ValueError(f"Unsupported layer material: {material}")
            thickness = float(row.get("thickness_nm", 0.0))
            if _is_substrate_row(material, thickness, index, len(rows)):
                continue
            if material == "Si":
                raise ValueError("Si can only be used as the final zero-thickness substrate row")
            lower = float(row.get("min_nm", 0.0))
            upper = float(row.get("max_nm", max(thickness, 1.0)))
            if not np.isfinite(thickness) or thickness < 0:
                raise ValueError(f"Invalid {material} thickness")
            if lower < 0 or upper <= lower or not lower <= thickness <= upper:
                raise ValueError(f"Invalid fit bounds for {material}: {lower} <= {thickness} <= {upper}")
            layers.append({
                "material": material,
                "thickness_nm": thickness,
                "in_reference": False if material == "Sample" else bool(
                    row.get("in_reference", True)
                ),
                "fit": bool(row.get("fit", False)),
                "min_nm": lower,
                "max_nm": upper,
            })
        if sum(layer["material"] == "Sample" for layer in layers) != 1:
            raise ValueError("The layer stack must contain exactly one Sample row")
        return layers

    layers = []
    reference_hbn = bool(config.get("reference_includes_hbn", False))
    if config.get("has_top_hbn", False):
        value = float(config.get("top_hbn_thick", 10.0))
        layers.append({"material": "hBN", "thickness_nm": value,
                       "in_reference": reference_hbn, "fit": False,
                       "min_nm": 0.0, "max_nm": 100.0})
    layers.append({"material": "Sample", "thickness_nm": float(config.get("sample_thick", 0.65)),
                   "in_reference": False, "fit": False, "min_nm": 0.1, "max_nm": 5.0})
    if config.get("has_bot_hbn", False):
        value = float(config.get("bot_hbn_thick", 10.0))
        layers.append({"material": "hBN", "thickness_nm": value,
                       "in_reference": reference_hbn, "fit": False,
                       "min_nm": 0.0, "max_nm": 100.0})
    if config.get("substrate_type", "Si/SiO2") == "Si/SiO2":
        value = float(config.get("sio2_thick", 285.0))
        layers.append({"material": "SiO2", "thickness_nm": value,
                       "in_reference": True, "fit": False,
                       "min_nm": max(0.0, value - 20.0), "max_nm": value + 20.0})
    return layers


def layer_fit_parameters(config):
    """Return (row index, value, lower, upper) for fitted layer thicknesses."""
    return [
        (index, row["thickness_nm"], row["min_nm"], row["max_nm"])
        for index, row in enumerate(normalized_layer_stack(config)) if row["fit"]
    ]


def config_with_layer_thicknesses(config, fitted_values):
    """Copy config and apply fitted thicknesses in table order."""
    updated = dict(config)
    layers = [dict(row) for row in normalized_layer_stack(config)]
    fitted_rows = [index for index, row in enumerate(layers) if row["fit"]]
    if len(fitted_values) != len(fitted_rows):
        raise ValueError("Fitted layer-thickness count does not match the layer table")
    for index, value in zip(fitted_rows, fitted_values):
        layers[index]["thickness_nm"] = float(value)
    updated["layers"] = layers
    return updated


def dielectric_func_lorentz(energy_ev, params):
    """Return epsilon(E) for [eps_inf, f1, E01, gamma1, ...]."""
    energy_ev = np.asarray(energy_ev, dtype=float)
    params = np.asarray(params, dtype=float)
    if params.size < 1 or (params.size - 1) % 3:
        raise ValueError("Lorentz parameters must be [eps_inf, f, E0, gamma, ...]")

    epsilon = np.full(energy_ev.shape, params[0], dtype=complex)
    for strength, resonance, linewidth in params[1:].reshape(-1, 3):
        if strength < 0 or resonance <= 0 or linewidth <= 0:
            raise ValueError("Lorentz oscillators require f >= 0, E0 > 0, and gamma > 0")
        denominator = resonance**2 - energy_ev**2 - 1j * energy_ev * linewidth
        epsilon += strength / denominator
    return epsilon


def dielectric_func_voigt(energy_ev, params):
    """Complex Voigt dielectric response using Faddeeva oscillators.

    Parameters are \`\`[eps_b, f1, E1, wL1, wG1, ...]\`\` where \`\`wL\`\` and
    \`\`wG\`\` are Lorentzian and Gaussian FWHM values in eV.
    """
    energy_ev = np.asarray(energy_ev, dtype=float)
    params = np.asarray(params, dtype=float)
    if params.size < 1 or (params.size - 1) % 4:
        raise ValueError("Voigt parameters must be [eps_b, f, E0, wL, wG, ...]")

    epsilon = np.full(energy_ev.shape, params[0], dtype=complex)
    root_ln2 = np.sqrt(np.log(2.0))
    prefactor_constant = 2j * np.sqrt(np.pi * np.log(2.0))
    for strength, resonance, lorentz_fwhm, gaussian_fwhm in params[1:].reshape(-1, 4):
        if strength < 0 or resonance <= 0:
            raise ValueError("Voigt oscillators require f >= 0 and E0 > 0")
        if lorentz_fwhm <= 0 or gaussian_fwhm <= 0:
            raise ValueError("Voigt linewidths must be positive")
        argument = (
            2.0 * root_ln2 * (energy_ev - resonance) / gaussian_fwhm
            + 1j * root_ln2 * lorentz_fwhm / gaussian_fwhm
        )
        epsilon += strength * prefactor_constant / gaussian_fwhm * wofz(argument)
    return epsilon


def spectral_derivative(values, wavelengths_nm, order=1):
    """Differentiate spectral values with respect to photon energy (eV)."""
    result = np.asarray(values, dtype=float)
    energy_ev = HC_EV_NM / np.asarray(wavelengths_nm, dtype=float)
    for _ in range(order):
        result = np.gradient(result, energy_ev, edge_order=2)
    return result


def calculate_contrast_dynamic(wavelengths_nm, eps_sample, mat_loader, config):
    """Calculate normal-incidence multilayer reflectance contrast.

    \`\`contrast_definition\`\` may be \`\`relative\`\` (the default,
    (R_sample-R_ref)/R_ref) or \`\`symmetric\`\`
    ((R_sample-R_ref)/(R_sample+R_ref)).
    """
    wavelengths_nm = np.atleast_1d(np.asarray(wavelengths_nm, dtype=float))
    eps_sample = np.broadcast_to(np.asarray(eps_sample, dtype=complex), wavelengths_nm.shape)
    if np.any(~np.isfinite(wavelengths_nm)) or np.any(wavelengths_nm <= 0):
        raise ValueError("Wavelengths must be finite and positive")

    n_2d = np.sqrt(eps_sample)
    # Select the passive square-root branch for the exp(-i*omega*t) convention.
    n_2d = np.where(np.imag(n_2d) < 0, -n_2d, n_2d)
    substrate_type = substrate_type_from_config(config)

    if substrate_type in ("Si/SiO2", "Si"):
        n_substrate = mat_loader.get_si_n_with_temp(
            wavelengths_nm, config.get("temp", 298.0)
        )
        n_oxide = mat_loader.get_sio2_n(wavelengths_nm)
    elif substrate_type == "TiO2":
        n_substrate = mat_loader.get_tio2_n(wavelengths_nm)
        n_oxide = None
    elif substrate_type == "Quartz":
        n_substrate = mat_loader.get_quartz_n(wavelengths_nm)
        n_oxide = None
    elif substrate_type == "Sapphire":
        n_substrate = mat_loader.get_sapphire_n(wavelengths_nm)
        n_oxide = None
    else:
        raise ValueError(f"Unsupported substrate type: {substrate_type}")

    n_substrate = np.broadcast_to(np.asarray(n_substrate, dtype=complex), wavelengths_nm.shape)
    layer_rows = normalized_layer_stack(config)

    def material_index(material):
        if material == "Sample":
            return n_2d
        method_name = {
            "hBN": "get_hbn_n", "Graphene": "get_graphene_n",
            "SiO2": "get_sio2_n", "Quartz": "get_quartz_n",
            "Sapphire": "get_sapphire_n", "TiO2": "get_tio2_n",
        }[material]
        return np.broadcast_to(
            np.asarray(getattr(mat_loader, method_name)(wavelengths_nm), dtype=complex),
            wavelengths_nm.shape,
        )

    def layer_stack(reference=False):
        return [
            (material_index(row["material"]), row["thickness_nm"])
            for row in layer_rows
            if not reference or row["in_reference"]
        ]

    def reflectance_at_angle(reference, sine_squared, polarization):
        layers = layer_stack(reference)
        matrix = np.broadcast_to(np.eye(2, dtype=complex), (wavelengths_nm.size, 2, 2)).copy()
        for index, thickness_nm in layers:
            normal_wavevector = forward_normal_wavevector(index, sine_squared)
            admittance = (
                normal_wavevector
                if polarization == "s"
                else index**2 / normal_wavevector
            )
            phase = 2 * np.pi * normal_wavevector * thickness_nm / wavelengths_nm
            cos_phase = np.cos(phase)
            sin_phase = np.sin(phase)
            layer_matrix = np.empty_like(matrix)
            layer_matrix[:, 0, 0] = cos_phase
            layer_matrix[:, 0, 1] = -1j * sin_phase / admittance
            layer_matrix[:, 1, 0] = -1j * admittance * sin_phase
            layer_matrix[:, 1, 1] = cos_phase
            matrix = matrix @ layer_matrix

        substrate_wavevector = forward_normal_wavevector(n_substrate, sine_squared)
        substrate_admittance = (
            substrate_wavevector
            if polarization == "s"
            else n_substrate**2 / substrate_wavevector
        )
        incident_wavevector = forward_normal_wavevector(1.0, sine_squared)
        incident_admittance = (
            incident_wavevector
            if polarization == "s"
            else 1.0 / incident_wavevector
        )
        denominator = matrix[:, 0, 0] + matrix[:, 0, 1] * substrate_admittance
        admittance = (
            matrix[:, 1, 0] + matrix[:, 1, 1] * substrate_admittance
        ) / denominator
        amplitude = (incident_admittance - admittance) / (incident_admittance + admittance)
        reflectance_value = np.abs(amplitude) ** 2
        if np.any(~np.isfinite(reflectance_value)):
            raise ValueError("TMM reflectance calculation produced non-finite values")
        if np.any(reflectance_value < -1e-12):
            raise ValueError("TMM reflectance calculation produced negative values")
        return np.maximum(reflectance_value, 0.0)

    def reflectance(reference):
        numerical_aperture = float(config.get("numerical_aperture", 0.0))
        if not 0.0 <= numerical_aperture < 1.0:
            raise ValueError("numerical_aperture must be in [0, 1)")
        if numerical_aperture == 0.0:
            return reflectance_at_angle(reference, 0.0, "s")

        # Uniform illumination of the objective pupil is uniform in sin(theta)^2.
        angular_points = max(2, int(config.get("angular_points", 7)))
        nodes, weights = np.polynomial.legendre.leggauss(angular_points)
        sine_squared = 0.5 * numerical_aperture**2 * (nodes + 1.0)
        normalized_weights = 0.5 * weights
        averaged = np.zeros(wavelengths_nm.shape, dtype=float)
        for value, weight in zip(sine_squared, normalized_weights):
            reflectance_s = reflectance_at_angle(reference, value, "s")
            reflectance_p = reflectance_at_angle(reference, value, "p")
            averaged += weight * 0.5 * (reflectance_s + reflectance_p)
        return averaged

    sample_reflectance = reflectance(reference=False)
    reference_reflectance = reflectance(reference=True)
    if np.any(reference_reflectance <= np.finfo(float).eps):
        raise ValueError("Reference reflectance is too close to zero for relative contrast")
    definition = config.get("contrast_definition", "relative")
    if definition == "symmetric":
        denominator = sample_reflectance + reference_reflectance
    elif definition == "relative":
        denominator = reference_reflectance
    else:
        raise ValueError(f"Unsupported contrast definition: {definition}")

    return np.divide(
        sample_reflectance - reference_reflectance,
        denominator,
        out=np.zeros_like(sample_reflectance),
        where=np.abs(denominator) > np.finfo(float).eps,
    )

from dataclasses import dataclass

import numpy as np
from scipy.optimize import differential_evolution, least_squares
from scipy.signal import find_peaks, peak_widths, savgol_filter
from scipy.special import expit


class FitCancelled(RuntimeError):
    """Raised when a caller requests cancellation during optimization."""


@dataclass
class FitResult:
    params: np.ndarray
    fitted: np.ndarray
    physical_model: np.ndarray
    baseline_coefficients: np.ndarray
    baseline_center: float
    baseline_scale: float
    standard_errors: np.ndarray
    covariance: np.ndarray
    success: bool
    message: str
    method: str
    nfev: int
    rmse: float
    mae: float
    r_squared: float
    reduced_chi_squared: float
    jacobian_condition: float
    durbin_watson: float

    def add_baseline(self, physical_model, energy_ev):
        """Apply the fitted additive baseline to model values."""
        physical_model = np.asarray(physical_model, dtype=float)
        if self.baseline_coefficients.size == 0:
            return physical_model
        x = (np.asarray(energy_ev, dtype=float) - self.baseline_center) / self.baseline_scale
        design = np.vander(x, N=self.baseline_coefficients.size, increasing=True)
        return physical_model + design @ self.baseline_coefficients


def smoothed_spectral_derivative(values, energy_ev, order=1, smoothing_ev=None):
    """Savitzky-Golay derivative on a uniform energy grid with noise suppression."""
    values = np.asarray(values, dtype=float)
    energy_ev = np.asarray(energy_ev, dtype=float)
    if values.shape != energy_ev.shape or values.ndim != 1 or values.size < 7:
        raise ValueError("derivative data must be equal one-dimensional arrays with >=7 points")
    if order not in (1, 2):
        raise ValueError("derivative order must be 1 or 2")
    sort_order = np.argsort(energy_ev)
    energy_sorted = energy_ev[sort_order]
    values_sorted = values[sort_order]
    uniform_energy = np.linspace(energy_sorted[0], energy_sorted[-1], energy_sorted.size)
    uniform_values = np.interp(uniform_energy, energy_sorted, values_sorted)
    spacing = float(uniform_energy[1] - uniform_energy[0])
    smoothing_ev = (0.004 if order == 1 else 0.008) if smoothing_ev is None else smoothing_ev
    window = max(order + 4, int(np.ceil(smoothing_ev / spacing)))
    window += 1 - window % 2
    maximum_window = values.size if values.size % 2 else values.size - 1
    window = min(window, maximum_window)
    polynomial_order = min(max(3, order + 2), window - 2)
    derivative_uniform = savgol_filter(
        uniform_values,
        window,
        polynomial_order,
        deriv=order,
        delta=spacing,
        mode="interp",
    )
    derivative_sorted = np.interp(energy_sorted, uniform_energy, derivative_uniform)
    derivative = np.empty_like(derivative_sorted)
    derivative[sort_order] = derivative_sorted
    return derivative


def finalize_physical_fit(
    result, energy_ev, measured, physical_model, baseline_order=3, sigma=None
):
    """Re-evaluate a fit in the original spectrum domain after derivative fitting."""
    energy_ev = np.asarray(energy_ev, dtype=float)
    measured = np.asarray(measured, dtype=float)
    physical_model = np.asarray(physical_model, dtype=float)
    design, center, scale = _baseline_design(energy_ev, baseline_order)
    weights = None
    if sigma is not None:
        sigma = np.broadcast_to(np.asarray(sigma, dtype=float), measured.shape)
        weights = 1.0 / sigma**2
    coefficients, baseline = _profile_baseline(
        measured - physical_model, design, weights
    )
    fitted = physical_model + baseline
    residual = fitted - measured
    rss = float(np.sum(residual**2))
    total = float(np.sum((measured - np.mean(measured)) ** 2))
    result.objective_r_squared = result.r_squared
    result.baseline_coefficients = coefficients
    result.baseline_center = center
    result.baseline_scale = scale
    result.physical_model = physical_model
    result.fitted = fitted
    result.rmse = float(np.sqrt(np.mean(residual**2)))
    result.mae = float(np.mean(np.abs(residual)))
    result.r_squared = 1.0 - rss / total if total > 0 else np.nan
    result.durbin_watson = float(np.sum(np.diff(residual) ** 2) / rss) if rss > 0 else np.nan
    return result


def resonance_balanced_sigma(energy_ev, measured, resonances):
    """Per-point scales that give each requested resonance local influence.

    \`\`resonances\`\` contains \`\`(center_eV, approximate_fwhm_eV)\`\` pairs. The
    full-spectrum scale is replaced near each resonance by its locally
    detrended amplitude, with a robust noise floor to avoid fitting noise.
    """
    energy_ev = np.asarray(energy_ev, dtype=float)
    measured = np.asarray(measured, dtype=float)
    if energy_ev.shape != measured.shape or energy_ev.ndim != 1:
        raise ValueError("energy and measured arrays must have equal one-dimensional shapes")
    global_scale = max(float(np.std(measured)), np.finfo(float).eps)
    noise_floor = 5.0 * _noise_scale(measured)
    sigma = np.full(measured.shape, global_scale)
    for center, fwhm in resonances:
        radius = float(np.clip(2.0 * max(float(fwhm), 0.005), 0.02, 0.08))
        mask = np.abs(energy_ev - float(center)) <= radius
        if np.count_nonzero(mask) < 7:
            continue
        local_energy = energy_ev[mask]
        normalized = (local_energy - np.mean(local_energy)) / max(np.ptp(local_energy), 1e-12)
        trend = np.polyval(np.polyfit(normalized, measured[mask], 1), normalized)
        local_scale = max(float(np.std(measured[mask] - trend)), noise_floor)
        sigma[mask] = np.minimum(sigma[mask], local_scale)
    return sigma


def resonance_windows_from_parameters(params, line_shape):
    """Extract (center, approximate FWHM) pairs from dielectric parameters."""
    params = np.asarray(params, dtype=float)
    if str(line_shape).lower() == "voigt":
        rows = params[1:].reshape(-1, 4)
        widths = 0.5346 * rows[:, 2] + np.sqrt(
            0.2166 * rows[:, 2] ** 2 + rows[:, 3] ** 2
        )
    else:
        rows = params[1:].reshape(-1, 3)
        widths = rows[:, 2]
    return [(float(row[1]), float(width)) for row, width in zip(rows, widths)]


def resonance_diagnostics(energy_ev, measured, fitted, resonances):
    """Return detrended local fit metrics for every requested resonance."""
    energy_ev = np.asarray(energy_ev, dtype=float)
    measured = np.asarray(measured, dtype=float)
    fitted = np.asarray(fitted, dtype=float)
    diagnostics = []
    for center, fwhm in resonances:
        radius = float(np.clip(2.0 * max(float(fwhm), 0.005), 0.02, 0.08))
        mask = np.abs(energy_ev - float(center)) <= radius
        if np.count_nonzero(mask) < 7:
            continue
        x = energy_ev[mask]
        x = (x - np.mean(x)) / max(np.ptp(x), 1e-12)
        measured_local = measured[mask]
        fitted_local = fitted[mask]
        measured_feature = measured_local - np.polyval(
            np.polyfit(x, measured_local, 1), x
        )
        fitted_feature = fitted_local - np.polyval(
            np.polyfit(x, fitted_local, 1), x
        )
        rss = float(np.sum((fitted_feature - measured_feature) ** 2))
        total = float(np.sum(measured_feature**2))
        measured_amplitude = float(np.ptp(measured_feature))
        diagnostics.append({
            "center_ev": float(center),
            "local_r_squared": 1.0 - rss / total if total > 0 else np.nan,
            "amplitude_ratio": (
                float(np.ptp(fitted_feature)) / measured_amplitude
                if measured_amplitude > 0 else np.nan

        假设 CSV 列顺序: Wavelength(um), n, k

            wavelengths_nm < lower,

    def get_graphene_n(self, lam_nm):
        """Effective visible/NIR index of monolayer graphene.

        Uses the universal interband sheet conductivity, represented as a
        0.335 nm film: epsilon = 1 + i*alpha*lambda/(2*d).
        """
        lam_nm = np.asarray(lam_nm, dtype=float)
        fine_structure = 1.0 / 137.035999084
        monolayer_nm = 0.335
        epsilon = 1.0 + 1j * fine_structure * lam_nm / (2.0 * monolayer_nm)
        return np.sqrt(epsilon)

    def get_quartz_n(self, lam_nm):
        """
        Quartz (Fused Silica) 折射率
        直接复用 SiO2 Sellmeier 方程
        """
        return self.get_sio2_n(lam_nm)

    def get_sapphire_n(self, lam_nm):
        """
        Sapphire (Al2O3) Refractive Index (Ordinary Ray)
        Formula:
        n^2 = 1 + 1.4313493/(1-(0.0726631/x)^2) + 0.65054713/(1-(0.1193242/x)^2) + 5.3414021/(1-(18.028251/x)^2)
        (x in microns)
        """
        x = lam_nm / 1000.0 # Convert to microns

        # Sellmeier Equation Terms
        # Using the provided coefficients
        # A1=1.4313493, B1=0.0726631
        # A2=0.65054713, B2=0.1193242
        # A3=5.3414021, B3=18.028251

        term1 = 1.4313493 / (1 - (0.0726631 / x)**2)
        term2 = 0.65054713/ (1 - (0.1193242 / x)**2)
        term3 = 5.3414021 / (1 - (18.028251 / x)**2)

        n_squared = 1 + term1 + term2 + term3
        n = np.sqrt(n_squared)

        return n + 0j

    def get_tio2_n(self, lam_nm):
        """
        TiO2 Refractive Index
        Formula: n = sqrt(5.913 + 0.2441 / (x^2 - 0.0803))
        (x in microns)
        """
        x = lam_nm / 1000.0 # Convert to microns

        # Formula provided by user
        n_squared = 5.913 + 0.2441 / (x**2 - 0.0803)
        n = np.sqrt(n_squared)

        return n + 0j
